<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button onclick="registerServiceWorker()">Push-Benachrichtigungen aktivieren</button>
    <button onclick="ping()">PING</button>
    <input type="text" id="token">

    <script>
        async function registerServiceWorker() {
            const publicVapidKey = "BHm1GIUIGMm3R47i5qRCPCo6oU4Z7dlc_g2JkXptkvcZOFLlobRAgJWpAmzKOrbiKBtBR69J4iB9-ISA_X8suNc";   

            const register = await navigator.serviceWorker.register('/worker.js');
            console.log(register.scope)

            const subscription = await register.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: publicVapidKey,
            });
            const token = document.getElementById("token").value;
            await fetch("subscribe", {
                method: "POST",
                body: JSON.stringify({"subscription": subscription, "token": token}),
                headers: {
                    "Content-Type": "application/json",
                }
            })
        }

        function ping() {
            fetch("/pushping")
        }
        
    </script>
</body>
</html>
