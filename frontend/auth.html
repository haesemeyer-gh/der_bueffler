<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Auth Büffler</title>


</head>

<body>
    <main>
        <section id="register">
            <h1>Register</h1>
            <form id="resister-form" action="/auth/register" method="POST">
                <label for="uname-register">Name</label>
                <input id="uname-register" name="uname" type="text" placeholder="Enter User Name...">
                <label for="email-register">Email</label>
                <input id="email-register" name="email" type="email" placeholder="Enter Email...">
                <label for="password-register">Password</label>
                <input id="password-register" name="password" type="password" placeholder="Enter Password...">
                <button type="submit">Submit</button>
            </form>
        </section> 

        <section id="login">
            <h1>Login</h1>
            <form id="login-form" action="/auth/login" method="POST">
                <label for="email-login">Email</label>
                <input id="email-login" name="email" type="email" placeholder="Enter Email...">
                <label for="password-login">Password</label>
                <input id="password-login" name="password" type="password" placeholder="Enter Password...">
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

</body>

</html>
