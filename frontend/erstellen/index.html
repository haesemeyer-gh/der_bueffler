<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termin Erstellen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../scripts/login.js" defer></script>
    <script src="../scripts/clock.js" defer></script>
    <script src="../scripts/push.js" defer></script>
    <script src="index.js" defer></script>
</head>
<body>

    <section id="login">
        <header>
            <h1>Der Büffler - Anmeldung</h1>
        </header>
        <div id="login-main">
            <label>E-Mail Adresse:<br>
                <input id="login-mail" type="text" />
            </label><br>
            <label>Passwort:<br>
                <input id="login-pass" type="password" />
            </label><br>
            <label>Anzeigename: <i>(nur Registierung)</i><br>
                <input id="register-uname" type="text" />
            </label><br>
            <button id="register-button" class="anmelde-button">Registrieren</button>
            <button id="login-button" class="anmelde-button">Anmelden</button>
            <!--<button id="reset" class="anmelde-button">Passwort vergessen?</button>-->
            <p id="login-status"></p>
        </div>
    </section>

    <header class="hidden requirelogin">
        <h1>Der Büffler!</h1>
        <nav>
            <a href="../"><img src="../assets/icons/home.svg" alt="Startseite"></a>
            <a href="../kalender"><img src="../assets/icons/calendar.svg" alt="Kalenderansicht"></a>
            <a class="current-page" href="#"><img src="../assets/icons/pen.svg" alt="Termin Erstellen"></a>
            <a href="../nutzerverwaltung"><img src="../assets/icons/team.svg" alt="Nutzerverwaltung"></a>
            <!--
            <a href="Noten.html"><img src="assets/icons/test.svg" alt="Notenübersicht"></a>
            <a href="Einstellungen.html"><img src="assets/icons/gear.svg" alt="Einstellungen"></a>
            -->
            <!--  <button id="subscribe-to-push">Push-Benachrichtigungen aktivieren</button> <!--?-->
        </nav>
    </header>

    <main class="hidden requirelogin">

        <h2 class="date-display">Datum: <i id="date"></i></h2>

        <div class="create-form">
			<div class="create-form-double">
				<div>
					<label>Team-ID: <i>(tmp)</i><br>
						<input id="create-form-teamid" class="create-form-input" type="number" />
					</label>
				</div>
				<div>
					<label>Datum: <i>(tmp)</i><br>
						<input id="create-form-date" class="create-form-input" type="datetime-local" />
					</label>
				</div>
			</div>
			<div class="create-form-double">
				<div>
					<label>Titel:<br>
						<input id="create-form-title" class="create-form-input" type="text" />
					</label>
				</div>
				<div class="create-form-double">
					<div>
						<label>Fach:<br>
							<input id="create-form-course" class="create-form-input" type="text" />
						</label>
					</div>
					<div>
						<label>Lehrer:<br>
							<input id="create-form-teacher" class="create-form-input" type="text" />
						</label>
					</div>
				</div>
			</div>
			<div>
				<label>Notizen:<br>
					<textarea id="create-form-notes" class="create-form-textarea"></textarea>
				</label>
			</div>
            <button id="create-form-button" class="create-form-button">Abschicken</button>
            <p id="create-form-status"></p>
        </div>


    </main>

</body>
</html>
