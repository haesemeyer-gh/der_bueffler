<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nutzerverwaltung</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../assets/style.css">
	<script src="../scripts/login.js" defer></script>
	<script src="../scripts/clock.js" defer></script>
	<script src="../scripts/push.js" defer></script>
	<script src="index.js" defer></script>
</head>
<body>

	<section id="login">
		<header>
			<h1>Der Büffler - Anmeldung</h1>
		</header>
		<div id="login-main">
			<label>E-Mail Adresse:<br>
				<input id="login-mail" type="text" />
			</label><br>
			<label>Passwort:<br>
				<div id="password-box">
					<input id="login-pass" type="password" />
					<button id="password-visibility-button"><img src="../assets/icons/eye.svg" alt="Passwort anzeigen" id="password-visibility-indicator" /></button>
				</div>
			</label><br>
			<label>Anzeigename: <i>(nur Registierung)</i><br>
				<input id="register-uname" type="text" />
			</label><br>
			<button id="register-button" class="anmelde-button">Registrieren</button>
			<button id="login-button" class="anmelde-button">Anmelden</button>
			<button id="reset" class="anmelde-button">Passwort vergessen?</button>
			<p id="login-status"></p>
		</div>
	</section>

	<header class="hidden requirelogin">
		<h1>Der Büffler!</h1>
		<nav>
			<a href="../"><img src="../assets/icons/home.svg" alt="Startseite"></a>
			<a href="../kalender"><img src="../assets/icons/calendar.svg" alt="Kalenderansicht"></a>
			<a href="../erstellen"><img src="../assets/icons/pen.svg" alt="Termin Erstellen"></a>
			<a class="current-page" href="#"><img src="../assets/icons/team.svg" alt="Nutzerverwaltung"></a>
			<!--
			<a href="Noten.html"><img src="assets/icons/test.svg" alt="Notenübersicht"></a>
			<a href="Einstellungen.html"><img src="assets/icons/gear.svg" alt="Einstellungen"></a>
			-->
			<!--  <button id="subscribe-to-push">Push-Benachrichtigungen aktivieren</button> <!--?-->
		</nav>
	</header>

	<main class="hidden requirelogin">

		<h2 class="date-display">Datum: <i id="date"></i></h2>

		<p><i>[schönes interface hier einfügen]</i></p>

		<h2>Entwickler-Formulare</h2>

		<div class="nv-dev-div">
			<h3><code>/teams/create</code></h3>
			<label>Team-Name:<br>
				<input id="nv-dev-teams-create-name" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-teams-create-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-teams-create-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/teams/delete</code></h3>
			<label>Team-ID:<br>
				<input id="nv-dev-teams-delete-id" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-teams-delete-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-teams-delete-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/teams/info</code></h3>
			<label>Team-ID:<br>
				<input id="nv-dev-teams-info-id" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-teams-info-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-teams-info-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/teams/add</code></h3>
			<label>Team-ID:<br>
				<input id="nv-dev-teams-add-teamid" class="nv-dev-input" type="number" />
			</label><br>
			<label>Nuter-ID:<br>
				<input id="nv-dev-teams-add-userid" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-teams-add-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-teams-add-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/teams/remove</code></h3>
			<label>Team-ID:<br>
				<input id="nv-dev-teams-remove-teamid" class="nv-dev-input" type="number" />
			</label><br>
			<label>Nuter-ID:<br>
				<input id="nv-dev-teams-remove-userid" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-teams-remove-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-teams-remove-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/teams/promote</code></h3>
			<label>Team-ID:<br>
				<input id="nv-dev-teams-promote-teamid" class="nv-dev-input" type="number" />
			</label><br>
			<label>Nuter-ID:<br>
				<input id="nv-dev-teams-promote-userid" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-teams-promote-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-teams-promote-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/teams/demote</code></h3>
			<label>Team-ID:<br>
				<input id="nv-dev-teams-demote-teamid" class="nv-dev-input" type="number" />
			</label><br>
			<label>Nuter-ID:<br>
				<input id="nv-dev-teams-demote-userid" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-teams-demote-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-teams-demote-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/user/maketeacher</code></h3>
			<label>Nutzer-ID:<br>
				<input id="nv-dev-user-maketeacher-id" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-user-maketeacher-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-user-maketeacher-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/user/deleteteacher</code></h3>
			<label>Nutzer-ID:<br>
				<input id="nv-dev-user-deleteteacher-id" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-user-deleteteacher-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-user-deletetacher-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/user/makeadmin</code></h3>
			<label>Nutzer-ID:<br>
				<input id="nv-dev-user-makeadmin-id" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-user-makeadmin-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-user-makeadmin-status"></p>
		</div>

		<div class="nv-dev-div">
			<h3><code>/user/getuserinfo</code></h3>
			<label>Nutzer-ID:<br>
				<input id="nv-dev-user-getuserinfo-id" class="nv-dev-input" type="number" />
			</label><br>
			<button id="nv-dev-user-getuserinfo-button" class="nv-dev-button">Abschicken</button>
			<p id="nv-dev-user-getuserinfo-status"></p>
		</div>

	</main>

</body>
</html>
