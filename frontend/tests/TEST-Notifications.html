<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button onclick="enablePushNotifications()">Push-Benachrichtigungen aktivieren</button>

    <script>
        function enablePushNotifications() {
            if ('Notification' in window && 'serviceWorker' in navigator) {
                // Benachrichtigungen Anfragen
                Notification.requestPermission(permission => {
                    if (permission === 'granted') {
                        console.log('Permission to receive notifications granted!');

                        // Service Worker registrieren
                        // Service Worker laufen im Hintergrund und haben prinzipiell zwei Aufgaben:
                        // 1. wie ein Proxy z.B. API Anfragen der Web-App abfangen und entscheiden, ob gecachte Inhalte zurückgegeben werden oder die Anfrage an die remote API weitergereicht wird
                        // 2. einfach im Hintergrund laufen für bspw. Push Benachrichtigungen, wofür es hier verwendet wird
                        navigator.serviceWorker.register('TEST-Notifications.js').then(registration => {
                            console.log('Service Worker registered with scope:', registration.scope);
                        }).catch(error => {
                            console.error('Service Worker registration failed:', error);
                        });

                    } else {
                        console.error('Notification permission denied!');
                    }
                });
            }
        }
    </script>
</body>
</html>
